<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="64" x2="1096" y2="672" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#164E63"/>
      <stop offset="1" stop-color="#65A30D"/>
    </linearGradient>
    <linearGradient id="glass" x1="220" y1="188" x2="1018" y2="542" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.24"/>
      <stop offset="1" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#84CC16"/>
    </linearGradient>
    <filter id="blur-xl" x="-120" y="-120" width="1520" height="960" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
    <filter id="shadow-soft" x="126" y="118" width="1028" height="484" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="28"/>
      <feGaussianBlur stdDeviation="32"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.031 0 0 0 0 0.094 0 0 0 0 0.169 0 0 0 0.26 0"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="40" fill="url(#bg)"/>

  <g filter="url(#blur-xl)" opacity="0.72">
    <circle cx="244" cy="124" r="148" fill="#22D3EE"/>
    <circle cx="1048" cy="118" r="144" fill="#A3E635"/>
    <circle cx="1112" cy="596" r="168" fill="#F59E0B"/>
    <circle cx="252" cy="584" r="180" fill="#0EA5E9"/>
  </g>

  <g opacity="0.85">
    <circle cx="206" cy="186" r="10" fill="#A3E635">
      <animate attributeName="cy" values="186;176;186" dur="4.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1082" cy="204" r="12" fill="#F59E0B">
      <animate attributeName="cy" values="204;214;204" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1030" cy="556" r="8" fill="white" fill-opacity="0.8">
      <animate attributeName="cy" values="556;548;556" dur="5.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#shadow-soft)">
    <rect x="190" y="166" width="900" height="340" rx="36" fill="url(#glass)" stroke="white" stroke-opacity="0.28"/>
  </g>

  <rect x="190" y="166" width="900" height="340" rx="36" fill="url(#glass)" stroke="white" stroke-opacity="0.22"/>
  <rect x="224" y="200" width="186" height="40" rx="20" fill="white" fill-opacity="0.12"/>
  <text x="252" y="226" fill="white" fill-opacity="0.88" font-size="18" font-family="Segoe UI, Arial, sans-serif" letter-spacing="2">CAMPUS AGENT APP</text>

  <text x="224" y="302" fill="white" font-size="78" font-weight="700" font-family="Segoe UI, Arial, sans-serif">南工破晓</text>
  <text x="224" y="354" fill="white" fill-opacity="0.86" font-size="28" font-family="Segoe UI, Arial, sans-serif">A calm, modern Android workspace for campus life.</text>
  <text x="224" y="404" fill="white" fill-opacity="0.7" font-size="22" font-family="Segoe UI, Arial, sans-serif">课表、教务、待办、复习、专注与智能体建议，被收束成一条更安静的日常路径。</text>

  <rect x="224" y="438" width="164" height="50" rx="25" fill="url(#accent)"/>
  <text x="260" y="470" fill="#0F172A" font-size="20" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Refactor Live</text>

  <rect x="406" y="438" width="176" height="50" rx="25" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.22"/>
  <text x="446" y="470" fill="white" font-size="20" font-weight="600" font-family="Segoe UI, Arial, sans-serif">Docs Ready</text>

  <g opacity="0.96">
    <rect x="916" y="226" width="124" height="108" rx="24" fill="#0F172A" fill-opacity="0.28" stroke="white" stroke-opacity="0.18"/>
    <text x="944" y="270" fill="#A3E635" font-size="20" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Modules</text>
    <text x="946" y="314" fill="white" font-size="34" font-weight="700" font-family="Segoe UI, Arial, sans-serif">8+</text>

    <rect x="882" y="354" width="158" height="108" rx="24" fill="#0F172A" fill-opacity="0.28" stroke="white" stroke-opacity="0.18"/>
    <text x="912" y="398" fill="#F59E0B" font-size="20" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Status</text>
    <text x="912" y="438" fill="white" font-size="28" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Ongoing</text>
  </g>
</svg>
